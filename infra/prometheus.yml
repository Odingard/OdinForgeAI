# OdinForge Production — Prometheus Scrape Config

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OdinForge application metrics
  - job_name: "odinforge-app"
    static_configs:
      - targets: ["odinforge-app:5000"]
        labels:
          environment: "production"
    metrics_path: "/metrics"
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
