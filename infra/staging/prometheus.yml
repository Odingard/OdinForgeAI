# OdinForge Staging — Prometheus Scrape Config

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "odinforge-staging"
    static_configs:
      - targets: ["staging-app:5000"]
        labels:
          environment: "staging"
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
