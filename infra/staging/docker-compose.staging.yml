version: "3.8"

# OdinForge Staging Environment
# Mirror of production at 159.65.234.95

services:
  caddy:
    image: caddy:2-alpine
    container_name: staging-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy

  app:
    image: ${APP_IMAGE:-odinforge-app:latest}
    container_name: staging-app
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://odinforge:${POSTGRES_PASSWORD}@postgres:5432/odinforge
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET_NAME: odinforge
      STORAGE_ACCESS_KEY_ID: odinforge
      STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      STORAGE_REGION: us-east-1
      STORAGE_FORCE_PATH_STYLE: "true"
      SERVER_URL: ${SERVER_URL:-http://staging.odinforgeai.com}
      PUBLIC_ODINFORGE_URL: ${SERVER_URL:-http://staging.odinforgeai.com}
      AGENT_REGISTRATION_TOKEN: ${AGENT_REGISTRATION_TOKEN:-}
      CLOUD_CREDENTIALS_KEY: ${CLOUD_CREDENTIALS_KEY:-}
      DISABLE_WORKER: "true"
      # GTM v1.0 feature flags
      BREACH_CHAIN_ENRICHED_NODES: "true"
      BREACH_CHAIN_SUB_AGENT_ENGINE: "true"
      BREACH_CHAIN_CREDENTIAL_BUS: "true"
      BREACH_CHAIN_ATTACK_ENGINE: "true"
      BREACH_CHAIN_ATTACK_HEATMAP: "true"
      BREACH_CHAIN_CREDENTIAL_WEB: "true"
      BREACH_CHAIN_DEFENSE_GAP: "true"
      BREACH_CHAIN_ENGAGEMENT_CONFIG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    image: ${APP_IMAGE:-odinforge-app:latest}
    container_name: staging-worker
    restart: unless-stopped
    command: ["node", "dist/worker.cjs"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://odinforge:${POSTGRES_PASSWORD}@postgres:5432/odinforge
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET}
      CLOUD_CREDENTIALS_KEY: ${CLOUD_CREDENTIALS_KEY:-}
      AGENT_REGISTRATION_TOKEN: ${AGENT_REGISTRATION_TOKEN:-}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET_NAME: odinforge
      STORAGE_ACCESS_KEY_ID: odinforge
      STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      STORAGE_REGION: us-east-1
      STORAGE_FORCE_PATH_STYLE: "true"
      BREACH_CHAIN_ENRICHED_NODES: "true"
      BREACH_CHAIN_SUB_AGENT_ENGINE: "true"
      BREACH_CHAIN_CREDENTIAL_BUS: "true"
      BREACH_CHAIN_ATTACK_ENGINE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg15
    container_name: staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: odinforge
      POSTGRES_USER: odinforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odinforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: staging-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: staging-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: odinforge
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: staging-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:10.4.0
    container_name: staging-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-odinforge-staging}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
