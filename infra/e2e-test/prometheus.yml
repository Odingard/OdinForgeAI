# OdinForge E2E Test — Prometheus Scrape Config

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OdinForge application metrics (running on host machine)
  - job_name: "odinforge"
    static_configs:
      - targets: ["host.docker.internal:5000"]
        labels:
          environment: "e2e-test"
    metrics_path: "/metrics"
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node exporter (if installed on host)
  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          environment: "e2e-test"
    scrape_interval: 30s
