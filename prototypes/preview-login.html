<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OdinForge — Login Preview</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--panel:#0c1018;--border:#1a2535;--border2:#243348;
  --red:#e8384f;--red-dim:rgba(232,56,79,.1);--red-border:rgba(232,56,79,.22);
  --green:#22c55e;--blue:#60a5fa;--amber:#f59e0b;
  --t1:#eaf0f8;--t2:#7a93ad;--t3:#3a5166;--t4:#1e3148;
  --mono:'IBM Plex Mono',Consolas,'Courier New',monospace;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--mono);overflow:hidden}
.screen{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.scanline{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);z-index:0}
.boot-wrap{width:100%;max-width:560px;position:relative;z-index:1;padding:24px}
.boot-pre{font-size:11px;line-height:1.8;color:var(--t3);min-height:200px}
.boot-pre .line{display:block;white-space:pre}
.boot-pre .ok{color:var(--green)}
.boot-pre .err{color:var(--red)}
.boot-pre .warn{color:var(--amber)}
.boot-pre .hi{color:var(--t2)}
.boot-pre .accent{color:var(--red)}
.cursor{display:inline-block;width:8px;height:13px;background:var(--red);vertical-align:middle;animation:blink .8s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.login-form{display:none;flex-direction:column;gap:0}
.brand-row{display:flex;align-items:center;gap:14px;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.brand-mark{width:38px;height:38px;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-mark svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2}
.brand-name{font-size:18px;font-weight:700;letter-spacing:.02em;color:var(--t1);font-family:var(--sans)}
.brand-sub{font-size:10px;letter-spacing:.18em;color:var(--t3);margin-top:2px;font-family:var(--mono)}
.form-field{margin-bottom:16px}
.form-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.form-label::before{content:'›';color:var(--red)}
.form-input{width:100%;background:var(--panel);border:1px solid var(--border2);color:var(--t1);font-family:var(--mono);font-size:12px;padding:10px 12px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--red)}
.form-input::placeholder{color:var(--t4)}
.form-btn{width:100%;padding:11px;background:var(--red);border:none;color:#fff;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:background .15s}
.form-btn:hover{background:#d42e44}
.form-err{display:none;font-size:10px;color:var(--red);padding:8px 10px;border:1px solid var(--red-border);background:var(--red-dim);margin-bottom:12px}
.form-footer{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.form-footer-left{font-size:9px;color:var(--t4);letter-spacing:.06em}
.form-footer-link{font-size:10px;color:var(--blue);cursor:pointer;letter-spacing:.04em}
.form-footer-link:hover{text-decoration:underline}
.status-strip{position:absolute;bottom:0;left:0;right:0;padding:8px 24px;border-top:1px solid var(--border);display:flex;align-items:center;gap:16px;font-size:9px;letter-spacing:.08em;color:var(--t4);background:var(--panel)}
.ss-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ss-sep{color:var(--border2)}
</style>
</head>
<body>
<div class="screen">
  <div class="scanline"></div>
  <div class="boot-wrap">
    <div class="boot-pre" id="boot"></div>
    <div class="login-form" id="loginForm">
      <div class="brand-row">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24"><path d="M12 2L4 6v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V6l-8-4z" stroke-width="1.5"/><path d="M9 12l2 2 4-4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div>
          <div class="brand-name">Odin<span style="color:var(--red)">Forge</span></div>
          <div class="brand-sub">adversarial exposure validation</div>
        </div>
      </div>
      <div class="form-err" id="formErr">Authentication failed. Check credentials.</div>
      <div class="form-field">
        <div class="form-label">operator identity</div>
        <input class="form-input" type="email" placeholder="operator@sixsenseenterprise.com" id="emailInput" autocomplete="off">
      </div>
      <div class="form-field">
        <div class="form-label">access key</div>
        <input class="form-input" type="password" placeholder="••••••••••••••••" id="passInput">
      </div>
      <button class="form-btn" id="loginBtn" onclick="tryLogin()">Authenticate →</button>
      <div class="form-footer">
        <div class="form-footer-left">MFA &middot; RBAC &middot; BSL 1.1</div>
        <div class="form-footer-link">Request access</div>
      </div>
    </div>
  </div>
  <div class="status-strip">
    <div class="ss-dot"></div>
    <span>engine nominal</span>
    <span class="ss-sep">&middot;</span>
    <span>mjolnir v4.2</span>
    <span class="ss-sep">&middot;</span>
    <span>build 2026.03.17</span>
    <span style="margin-left:auto;color:var(--t3)">odingard security // six sense enterprise services</span>
  </div>
</div>
<script>
const boot=document.getElementById('boot');
const form=document.getElementById('loginForm');
const lines=[
  {t:0,   cls:'hi',  txt:'OdinForge AEV  //  Mjolnir Engine v4.2'},
  {t:200, cls:'',    txt:'Build 2026.03.17-prod  //  Odingard Security'},
  {t:400, cls:'',    txt:''},
  {t:600, cls:'hi',  txt:'BOOT SEQUENCE'},
  {t:700, cls:'ok',  txt:'  [OK]  kernel integrity verified'},
  {t:900, cls:'ok',  txt:'  [OK]  evidence contract runtime loaded'},
  {t:1100,cls:'ok',  txt:'  [OK]  exploit engine calibrated'},
  {t:1300,cls:'ok',  txt:'  [OK]  agent mesh online  (300 concurrent slots)'},
  {t:1500,cls:'ok',  txt:'  [OK]  EvidenceContract v2.0 enforced'},
  {t:1700,cls:'ok',  txt:'  [OK]  phase executors 1-6 ready'},
  {t:1900,cls:'ok',  txt:'  [OK]  defender mirror — sigma rule engine ready'},
  {t:2100,cls:'ok',  txt:'  [OK]  breach chain replay recorder ready'},
  {t:2300,cls:'ok',  txt:'  [OK]  PostgreSQL 15 — connected'},
  {t:2500,cls:'ok',  txt:'  [OK]  Redis 7 — connected'},
  {t:2700,cls:'ok',  txt:'  [OK]  WebSocket mesh — listening on :5000/ws'},
  {t:2900,cls:'',    txt:''},
  {t:3000,cls:'warn',txt:'  [!!]  2 active engagements detected'},
  {t:3200,cls:'warn',txt:'  [!!]  3 critical findings pending review'},
  {t:3400,cls:'',    txt:''},
  {t:3600,cls:'accent',txt:'AUTHENTICATION REQUIRED'},
  {t:3700,cls:'',    txt:''},
];
let cursor=null;
function addLine(l){
  const span=document.createElement('span');
  span.className='line'+(l.cls?' '+l.cls:'');
  span.textContent=l.txt;
  if(cursor)boot.removeChild(cursor);
  boot.appendChild(span);
  cursor=document.createElement('span');
  cursor.className='line';
  cursor.innerHTML='<span class="cursor"></span>';
  boot.appendChild(cursor);
}
lines.forEach(l=>setTimeout(()=>addLine(l),l.t));
setTimeout(()=>{
  if(cursor)boot.removeChild(cursor);
  boot.style.display='none';
  form.style.display='flex';
  document.getElementById('emailInput').focus();
},3900);
function tryLogin(){
  const email=document.getElementById('emailInput').value;
  const pass=document.getElementById('passInput').value;
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('formErr');
  if(!email||!pass){err.style.display='block';err.textContent='All fields required.';return;}
  err.style.display='none';
  btn.textContent='Authenticating...';
  btn.disabled=true;
  setTimeout(()=>{
    btn.textContent='Authenticate →';
    btn.disabled=false;
    err.style.display='block';
    err.textContent='Demo mode — no backend connected.';
  },1200);
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
</script>
</body>
</html>
